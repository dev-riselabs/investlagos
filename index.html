    <meta name="description" content="Invest Lagos 3.0 – Africa's flagship investment engagement summit, June 8–10, 2026, Lagos, Nigeria." />
    <title>Invest Lagos 3.0 | Africa's Investment Gateway</title>
    <!-- Kill-switch: unregister any old PWA service workers and wipe all caches -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (var reg of registrations) {
            reg.unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (names) {
          for (var name of names) {
            caches.delete(name);
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
